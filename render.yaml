services:
  - type: web
    name: farmkitti-api
    plan: free
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: farmkitti-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: farmkitti-db
    plan: free
    databaseName: farmkitti
    user: farmkitti_user
